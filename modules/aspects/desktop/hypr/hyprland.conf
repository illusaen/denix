monitor = desc:LG Electronics LG ULTRAGEAR+ 508RMWVJR505, preferred, 0x0, auto
monitor = desc:Philips Consumer Electronics Company PHL 288E2 UK52215001852, preferred, auto-center-up, 1.25

general {
  border_size = 0
  layout = scrolling
  resize_on_border = true
  gaps_in = 8
  gaps_out = 16
}

decoration {
  rounding = 8
  inactive_opacity = 0.8
  blur {
    popups = true
    special = true
  }
}

input {
  scroll_factor = 1.1
  follow_mouse = 2
  scroll_button = 274
  scroll_method = on_button_down
}

scrolling {
  fullscreen_on_one_column = false
  column_width = 0.4
  explicit_column_widths = 0.333, 0.667
  focus_fit_method = 0
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  initial_workspace_tracking = 1
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
}

bindd = ALT SHIFT, 4, Screenshot, exec, dms screenshot -d ~/Pictures/Screenshots
bindd = ALT SHIFT, T, Terminal, exec, kitten quick-access-terminal
bindd = CTRL, Space, Launcher, exec, dms ipc call spotlight toggle
bindd = CTRL SHIFT, Space, Notepad, exec, dms ipc call notepad toggle
bindd = SUPER CTRL, Space, PowerMenu, exec, dms ipc call powermenu toggle
bindd = CTRL ALT, Space, Clipboard, exec, dms ipc call clipboard toggle
bindd = SUPER, Escape, Keybinds, exec, dms ipc call keybinds open hyprland

bindd = SUPER, Q, Close Window, killactive
bindd = SUPER CTRL SHIFT, Q, Kill Wine, exec, pkill -9 winedevice.exe
bindd = SUPER, G, Google Chrome, exec, google-chrome-stable

binddm = SUPER, mouse:272, Move Window, movewindow
bindd = SUPER SHIFT, P, Power Off Monitors, exec, sleep 1 && hyprctl dispatch dpms off

bindd = SUPER, C, Expand Available Width, layoutmsg, fit visible
bindd = SUPER, Left, Focus Left, layoutmsg, focus l
bindd = SUPER, Right, Focus Right, layoutmsg, focus r
bindd = SUPER SHIFT, Left, Swap Column Left, layoutmsg, swapcol l
bindd = SUPER SHIFT, Right, Swap Column Right, layoutmsg, swapcol r
bindd = SUPER, Z, Resize Preset Column Width, layoutmsg, colresize +conf

bindd = SUPER, Up, Focus Previous Workspace, workspace, m-1
bindd = SUPER, Down, Focus Next Workspace, workspace, m+1
bindd = SUPER SHIFT, Up, Move Window to Previous Workspace, movetoworkspace, m-1
bindd = SUPER SHIFT, Down, Move Window to Next Workspace, movetoworkspace, m+1
bindd = SUPER CTRL, Up, Focus Previous Monitor, focusmonitor, u
bindd = SUPER CTRL, Down, Focus Next Monitor, focusmonitor, d
bindd = SUPER CTRL SHIFT, Up, Move Window to Previous Monitor, movewindow, mon:desc:Philips Consumer Electronics Company PHL 288E2 UK52215001852
bindd = SUPER CTRL SHIFT, Down, Move Window to Next Monitor, movewindow, mon:desc:LG Electronics LG ULTRAGEAR+ 508RMWVJR505

bind = SUPER, V, togglefloating

bindeld = , XF86AudioLowerVolume, Lower Volume, exec, dms ipc call audio decrement 5
bindeld = , XF86AudioRaiseVolume, Raise Volume, exec, dms ipc call audio increment 5
bindld = , XF86AudioMute, Mute, exec, dms ipc call audio mute
bindld = , XF86AudioPrev, Previous Track, exec, playerctl previous
bindld = , XF86AudioNext, Next Track, exec, playerctl next
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause

workspace = name:chat, monitor:desc:LG Electronics LG ULTRAGEAR+ 508RMWVJR505, persistent:true
workspace = name:code, monitor:desc:LG Electronics LG ULTRAGEAR+ 508RMWVJR505, persistent:true, default:true
workspace = name:gaming, monitor:desc:LG Electronics LG ULTRAGEAR+ 508RMWVJR505, persistent:true
workspace = name:music, monitor:desc:Philips Consumer Electronics Company PHL 288E2 UK52215001852, persistent:true, default:true

window_rule = float on, center on, match:title ^(.*)(o|O|s|S)(pen|ave) (f|F|a|a)(ile|s)(.*)$
window_rule = float on, center on, match:title ^(Select Extract)(.*)$
window_rule = float on, center on, size monitor_w*0.35 monitor_h*0.3, match:class ^nemo$
window_rule = float on, center on, size monitor_w*0.35 monitor_h*0.3, match:class ^xdg-desktop-portal-(.+)$
window_rule = float on, center on, size monitor_w*0.35 monitor_h*0.3, match:class ^org.pulseaudio.pavucontrol$
window_rule = float on, center on, size monitor_w*0.35 monitor_h*0.3, match:class ^(.*)(blueman-manager)(.*)$
window_rule = workspace name:gaming silent, match:class ^(.*)steam(.*)$
window_rule = workspace name:chat silent, match:class ^(.*)(vesktop|discord|Element|telegram)(.*)$

animation = fade, 1, 2, default
animation = workspaces, 1, 2, default
animation = windows, 1, 2, default
